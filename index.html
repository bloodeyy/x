<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@gotstars portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #0b0c15; /* Absolute Dark Background */
      background-image: 
        radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.08) 0px, transparent 50%);
    }

    .font-title {
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Scrollbar Style Customizations */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0f111a;
    }
    ::-webkit-scrollbar-thumb {
      background: #1f2937;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #8b5cf6;
    }
  </style>
</head>
<body class="text-gray-100 min-h-screen pb-12 transition-all">

  <div class="max-w-md mx-auto px-4 pt-6 space-y-6">

    <div class="bg-[#121424]/90 border border-gray-800 rounded-3xl p-5 shadow-2xl relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-purple-500 via-pink-500 to-blue-500 opacity-60"></div>
      
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-xl font-bold text-white tracking-tight font-title flex items-center gap-1.5">
            @gotstars portfolio
          </h1>
          <div class="flex items-center gap-1.5 mt-1">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-[10px] text-gray-400" id="connected-user-text">Connected as gotstars</span>
          </div>
        </div>

        <a id="profile-redirect-btn" href="#" target="_blank" 
           class="px-4 py-2 bg-gradient-to-r from-purple-600/20 to-indigo-600/20 hover:from-purple-600 hover:to-indigo-600 border border-purple-500/30 hover:border-transparent rounded-xl text-xs font-semibold text-purple-300 hover:text-white transition-all duration-300 flex items-center gap-1 shadow-lg shadow-purple-500/5">
          <i class="fa-solid fa-user-gear text-[10px]"></i> Profile
        </a>
      </div>
    </div>


    <div class="bg-black border border-gray-800 rounded-3xl overflow-hidden shadow-2xl relative">
      <div id="profile-banner-bg" class="h-28 bg-cover bg-center relative transition-all duration-500">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]"></div>
        <div class="absolute top-3 right-3 flex gap-1.5">
          <span class="text-[10px] bg-black/60 backdrop-blur-md px-2 py-0.5 rounded-full text-purple-300 border border-purple-500/20 font-mono">gotstars</span>
        </div>
      </div>

      <div class="px-5 pb-5 relative">
        <div class="flex justify-between items-end -mt-10 mb-4 relative z-10">
          <div class="relative">
            <img id="profile-avatar" src="" alt="Discord Avatar" 
              class="w-20 h-20 rounded-full border-4 border-black object-cover shadow-xl bg-gray-900">
            <span id="profile-status-indicator" class="absolute bottom-1 right-1 w-5 h-5 rounded-full border-4 border-black" title="Status"></span>
          </div>
          
          <div class="flex items-center gap-1.5 bg-black/60 border border-gray-800/80 px-2.5 py-1.5 rounded-full backdrop-blur-md" id="profile-badges-container">
            </div>
        </div>

        <div class="space-y-1">
          <div class="flex items-center gap-2">
            <h2 class="text-xl font-bold text-white tracking-tight" id="profile-display-name">star</h2>
          </div>
          <div class="flex items-center gap-1.5">
            <p class="text-xs text-purple-400 font-medium" id="profile-username">gotstars •</p>
            <span class="text-xs text-pink-400 font-bold tracking-wide drop-shadow-[0_0_6px_rgba(244,114,182,0.4)] animate-pulse" id="profile-heart-tag"> ankit</span>
          </div>
        </div>

        <div class="mt-4 bg-[#090a12] border border-gray-900 rounded-2xl p-3 flex items-center gap-2.5">
          <span class="text-base text-purple-400" id="profile-status-emoji">☁️</span>
          <span class="text-xs text-gray-300 font-medium italic" id="profile-status-text">..loopholic!</span>
        </div>

        <div class="mt-4 pt-4 border-t border-gray-900">
          <h3 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5">About Me</h3>
          <p class="text-xs text-gray-300 leading-relaxed" id="profile-bio"></p>
        </div>

        <div class="mt-4 pt-4 border-t border-gray-900">
          <h3 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Connections</h3>
          <div class="grid grid-cols-1" id="profile-connections-grid">
            </div>
        </div>

        <div class="mt-4 pt-4 border-t border-gray-900 space-y-3">
          <h3 class="text-xs font-bold uppercase tracking-wider text-gray-500">Live Activity</h3>
          
          <div class="bg-[#090a12] border border-purple-900/10 rounded-2xl p-3.5" id="competing-panel">
            <span class="text-[9px] uppercase font-bold text-purple-400 tracking-wider inline-block mb-2" id="activity-type">Competing in</span>
            <div class="flex gap-3">
              <img id="activity-image" src="" alt="Activity Image" 
                class="w-12 h-12 rounded-xl object-cover shadow-md bg-gray-900">
              <div class="space-y-0.5">
                <h4 class="text-xs font-bold text-white" id="activity-name">undefined</h4>
                <p class="text-[11px] text-gray-500" id="activity-details"></p>
              </div>
            </div>
          </div>

          <div class="bg-[#090a12] border border-emerald-950/10 rounded-2xl p-3.5" id="spotify-panel">
            <div class="flex justify-between items-start mb-2">
              <span class="text-[9px] uppercase font-bold text-emerald-400 tracking-wider flex items-center gap-1">
                <i class="fa-brands fa-spotify text-xs"></i> Listening to Spotify
              </span>
              <span class="text-[9px] text-emerald-400 font-mono animate-pulse">Live</span>
            </div>
            <div class="flex gap-3">
              <img id="spotify-album-art" src="" alt="Album Art" 
                class="w-12 h-12 rounded-xl object-cover shadow-md bg-gray-900">
              <div class="flex-1 min-w-0">
                <h4 class="text-xs font-bold text-white truncate" id="spotify-track"></h4>
                <p class="text-[11px] text-gray-400 truncate" id="spotify-artist"></p>
                
                <div class="mt-2 space-y-1">
                  <div class="w-full bg-gray-800 rounded-full h-1 overflow-hidden">
                    <div id="spotify-progress" class="bg-emerald-500 h-1 rounded-full transition-all duration-1000" style="width: 0%"></div>
                  </div>
                  <div class="flex justify-between text-[9px] text-gray-500 font-mono">
                    <span id="spotify-time-elapsed">00:00</span>
                    <span id="spotify-time-total">00:00</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>

      </div>
    </div>


    <div class="bg-[#121424] border border-gray-800 rounded-3xl p-5 shadow-2xl space-y-4">
      <div class="text-center">
        <h3 class="text-base font-extrabold tracking-tight text-white font-title bg-gradient-to-r from-purple-400 via-pink-400 to-indigo-400 bg-clip-text text-transparent">
          love from gotstars
        </h3>
        <p class="text-[9px] text-gray-500 uppercase tracking-widest mt-0.5">Let's connect & build projects together</p>
      </div>

      <div class="space-y-2.5" id="social-rows-list">
        </div>
    </div>

  </div>

  <div id="toast-notif" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-[#17192c] border border-purple-500/30 text-white text-xs px-4 py-3 rounded-2xl shadow-2xl flex items-center gap-3 transform translate-y-24 opacity-0 transition-all duration-300 z-50 max-w-sm w-[90%]">
    <div class="bg-purple-600/20 text-purple-400 p-2 rounded-xl">
      <i class="fa-solid fa-circle-info text-sm"></i>
    </div>
    <div class="flex-1">
      <p id="toast-message" class="font-medium text-gray-300"></p>
    </div>
    <button onclick="dismissToast()" class="text-gray-400 hover:text-white">
      <i class="fa-solid fa-xmark text-xs"></i>
    </button>
  </div>

  <script>
    let activeConfig = null;
    let spotifySecondsCounter = 0;
    let spotifyTickerInterval = null;

    window.addEventListener('DOMContentLoaded', () => {
      fetchConfigProperties();
    });

    async function fetchConfigProperties() {
      try {
        const res = await fetch('/api/config');
        if (res.ok) {
          activeConfig = await res.json();
          renderInterface();
        } else {
          showToast("Server loaded from gotstars.html!");
          loadFallbackHardcoded();
        }
      } catch (err) {
        console.warn("Express server error.", err);
        loadFallbackHardcoded();
      }
    }

    function loadFallbackHardcoded() {
      activeConfig = {
        "appId": "gotstars",
        "controller": {
          "title": "@gotstars portfolio",
          "username": "gotstars",
          "statusBadge": "Connected",
          "profileRedirect": "https://discord.com/users/620675924584562718"
        },
        "profile": {
          "displayName": "star",
          "username": "gotstars • ",
          "usHeartTag": "ankit",
          "avatarUrl": "https://cdn.discordapp.com/attachments/1494059374082261143/1523252869480845382/6967b26f650771c85081d5154475facb.png?ex=6a4b6f48&is=6a4a1dc8&hm=3fd0762f893ef7c06d2c4ed3698cddade3f2d955fb22874f780b1485f476ec47&",
          "bannerUrl": "https://cdn.discordapp.com/attachments/1494059374082261143/1523253075303989278/6319575e7fb9ca2b41110ba7313c7e9a.jpg?ex=6a4b6f79&is=6a4a1df9&hm=66b5080047b418384a814a7d355234e27b66dc847a7c7fbc8f42e8cc073728fd&",
          "statusEmoji": "☁️",
          "statusText": "..loopholic!",
          "statusIndicator": "idle",
          "bio": "I want to become one of the stars.",
          "badges": [
            { "icon": "fa-solid fa-bolt", "color": "text-pink-400", "title": "Discord Nitro" },
            { "icon": "fa-solid fa-shield-halved", "color": "text-purple-400", "title": "HypeSquad Bravery" },
            { "icon": "fa-solid fa-compact-disc", "color": "text-emerald-400", "title": "Active Developer" },
            { "icon": "fa-solid fa-crown", "color": "text-amber-400", "title": "Server Founder" }
          ],
          "connections": [
            { "name": "Known as", "icon": "fa-solid fa-crown", "color": "text-blue-400", "value": "blood9yy" }
          ]
        },
        "activity": {
          "type": "Competing in",
          "name": "undefined",
          "details": "Loving gotstars",
          "imageUrl": "https://cdn.discordapp.com/attachments/1494059374082261143/1523252869480845382/6967b26f650771c85081d5154475facb.png?ex=6a4b6f48&is=6a4a1dc8&hm=3fd0762f893ef7c06d2c4ed3698cddade3f2d955fb22874f780b1485f476ec47&"
        },
        "spotify": {
          "track": "Iss Tarah",
          "artist": "Chaar Diwaari, Sonu Nigam",
          "albumArt": "https://i.imgur.com/39N9rUq.jpg",
          "durationSeconds": 323,
          "elapsedSeconds": 44
        },
        "socials": [
          { "name": "GitHub Profile", "url": "https://github.com", "icon": "fa-brands fa-github", "color": "text-white" },
          { "name": "Discord Server", "url": "https://discord.gg/vapes", "icon": "fa-brands fa-discord", "color": "text-[#5865F2]" },
          { "name": "Telegram Link", "url": "https://t.me/bloodeyyy", "icon": "fa-brands fa-telegram", "color": "text-[#0088cc]" },
          { "name": "Instagram Profile", "url": "https://instagram.com", "icon": "fa-brands fa-instagram", "color": "text-[#E1306C]" },
          { "name": "YouTube Channel", "url": "https://youtube.com", "icon": "fa-brands fa-youtube", "color": "text-[#FF0000]" }
        ]
      };
      renderInterface();
    }

    function renderInterface() {
      if (!activeConfig) return;

      // 1. Controller Container Variables
      document.getElementById('connected-user-text').innerText = `Connected as ${activeConfig.controller.username}`;
      document.getElementById('profile-redirect-btn').href = activeConfig.controller.profileRedirect;

      // Dynamic Banner background assignment
      if(activeConfig.profile.bannerUrl) {
         document.getElementById('profile-banner-bg').style.backgroundImage = `url('${activeConfig.profile.bannerUrl}')`;
      }

      // 2. Profile Details Configuration
      document.getElementById('profile-avatar').src = activeConfig.profile.avatarUrl;
      document.getElementById('profile-display-name').innerText = activeConfig.profile.displayName;
      document.getElementById('profile-username').innerText = activeConfig.profile.username;
      document.getElementById('profile-heart-tag').innerText = activeConfig.profile.usHeartTag || '[❤️ us]';
      document.getElementById('profile-status-emoji').innerText = activeConfig.profile.statusEmoji;
      document.getElementById('profile-status-text').innerText = activeConfig.profile.statusText;
      document.getElementById('profile-bio').innerText = activeConfig.profile.bio;

      // Status indicator update
      const statusElement = document.getElementById('profile-status-indicator');
      statusElement.className = "absolute bottom-1 right-1 w-5 h-5 rounded-full border-4 border-black";
      if (activeConfig.profile.statusIndicator === 'online') {
        statusElement.classList.add('bg-emerald-500');
      } else if (activeConfig.profile.statusIndicator === 'idle') {
        statusElement.classList.add('bg-amber-500');
      } else if (activeConfig.profile.statusIndicator === 'dnd') {
        statusElement.classList.add('bg-rose-500');
      } else {
        statusElement.classList.add('bg-gray-500');
      }

      // Render Badges
      const badgesWrapper = document.getElementById('profile-badges-container');
      badgesWrapper.innerHTML = '';
      activeConfig.profile.badges.forEach(badge => {
        const icon = document.createElement('i');
        icon.className = `${badge.icon} ${badge.color} text-xs`;
        icon.title = badge.title;
        badgesWrapper.appendChild(icon);
      });

      // Render Connections
      const connectionsGrid = document.getElementById('profile-connections-grid');
      connectionsGrid.innerHTML = '';
      activeConfig.profile.connections.forEach(conn => {
        const card = document.createElement('div');
        card.className = "bg-[#090a12] border border-gray-900 px-3 py-2.5 rounded-xl flex items-center gap-3";
        card.innerHTML = `
          <i class="${conn.icon} ${conn.color} text-sm"></i>
          <div class="truncate">
            <span class="text-[8px] text-gray-500 uppercase font-bold tracking-tight block">${conn.name}</span>
            <span class="text-xs text-white truncate font-medium block">${conn.value}</span>
          </div>
        `;
        connectionsGrid.appendChild(card);
      });

      // Render General Custom Activity
      document.getElementById('activity-type').innerText = activeConfig.activity.type;
      document.getElementById('activity-name').innerText = activeConfig.activity.name;
      document.getElementById('activity-state').innerText = activeConfig.activity.state;
      document.getElementById('activity-details').innerText = activeConfig.activity.details;
      document.getElementById('activity-image').src = activeConfig.activity.imageUrl;

      // Render Spotify Values
      document.getElementById('spotify-album-art').src = activeConfig.spotify.albumArt;
      document.getElementById('spotify-track').innerText = activeConfig.spotify.track;
      document.getElementById('spotify-artist').innerText = activeConfig.spotify.artist;
      document.getElementById('spotify-time-total').innerText = formatTimeDuration(activeConfig.spotify.durationSeconds);
      spotifySecondsCounter = activeConfig.spotify.elapsedSeconds;
      
      startSpotifySimulation();

      // 3. Social Rows List
      const socialLinesWrapper = document.getElementById('social-rows-list');
      socialLinesWrapper.innerHTML = '';
      activeConfig.socials.forEach(social => {
        const item = document.createElement('a');
        item.href = social.url;
        item.target = '_blank';
        item.className = "group flex items-center justify-between bg-[#181a30]/60 hover:bg-[#181a30] border border-gray-800/60 hover:border-purple-500/30 px-4 py-3 rounded-2xl transition-all duration-300 cursor-pointer";
        item.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-xl bg-gray-950/40 flex items-center justify-center group-hover:scale-110 transition-transform">
              <i class="${social.icon} text-sm ${social.color}"></i>
            </div>
            <span class="text-xs font-semibold text-gray-300 group-hover:text-white transition-colors">${social.name}</span>
          </div>
          <span class="text-purple-400 group-hover:text-purple-300 font-extrabold text-sm transition-transform duration-300 group-hover:translate-x-1.5">
            》
          </span>
        `;
        socialLinesWrapper.appendChild(item);
      });
    }

    function startSpotifySimulation() {
      if (spotifyTickerInterval) clearInterval(spotifyTickerInterval);

      spotifyTickerInterval = setInterval(() => {
        if (spotifySecondsCounter >= activeConfig.spotify.durationSeconds) {
          spotifySecondsCounter = 0;
        } else {
          spotifySecondsCounter++;
        }

        const progressPercent = (spotifySecondsCounter / activeConfig.spotify.durationSeconds) * 100;
        document.getElementById('spotify-progress').style.width = `${progressPercent}%`;
        document.getElementById('spotify-time-elapsed').innerText = formatTimeDuration(spotifySecondsCounter);
      }, 1000);
    }

    function formatTimeDuration(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const remainingSecs = totalSeconds % 60;
      return `${minutes.toString().padStart(2, '0')}:${remainingSecs.toString().padStart(2, '0')}`;
    }

    function showToast(message) {
      const toast = document.getElementById('toast-notif');
      document.getElementById('toast-message').innerText = message;
      toast.classList.remove('translate-y-24', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');

      setTimeout(() => {
        dismissToast();
      }, 4000);
    }

    function dismissToast() {
      const toast = document.getElementById('toast-notif');
      toast.classList.remove('translate-y-0', 'opacity-100');
      toast.classList.add('translate-y-24', 'opacity-0');
    }
  </script>
</body>
</html>
